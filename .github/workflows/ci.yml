name: Rust Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo builds
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-features --workspace

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache cargo builds
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage Run
        env:
          LLVM_COV_FLAGS: -ignore-filename-regex=.*/src/grpc_impl\.rs
        run: cargo llvm-cov --all-features --workspace --tests --no-report

      - name: Coverage Threshold
        env:
          LLVM_COV_FLAGS: -ignore-filename-regex=.*/src/grpc_impl\.rs
        shell: bash
        run: |
          set -euo pipefail
          report="$(cargo llvm-cov report)"
          printf '%s\n' "$report"
          total="$(printf '%s\n' "$report" | awk '/^TOTAL/ { print $10 }')"
          awk -v total="$total" 'BEGIN { exit ((total + 0) >= 99 ? 0 : 1) }'
